<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Vocaloid 3D Pro</title>
<style>
body { margin: 0; overflow: hidden; }

#menu {
  position: absolute; width: 100%; height: 100%;
  background: black; color: white;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
}
button { padding: 10px 20px; font-size: 20px; margin: 10px; }

/* joystick */
#joystick {
  position: absolute;
  bottom: 40px;
  left: 40px;
  width: 100px;
  height: 100px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
}
#stick {
  width: 40px;
  height: 40px;
  background: white;
  border-radius: 50%;
  position: absolute;
  left: 30px;
  top: 30px;
}
</style>
</head>
<body>

<div id="menu">
  <h1>Vocaloid Game</h1>
  <button onclick="startGame()">Play</button>
</div>

<div id="joystick"><div id="stick"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
let scene, camera, renderer, player;
let moveX = 0, moveY = 0;

// iniciar
function startGame() {
  document.getElementById("menu").style.display = "none";
  init();
  animate();
}

// escena
function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0,2,5);

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // luz
  let light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(5,10,5);
  scene.add(light);

  // piso
  let floor = new THREE.Mesh(
    new THREE.PlaneGeometry(50,50),
    new THREE.MeshStandardMaterial({color: 0x555555})
  );
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // jugador
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color: 0xff69b4})
  );
  player.position.y = 0.5;
  scene.add(player);
}

// 🎮 JOYSTICK (movimiento tipo Roblox)
let stick = document.getElementById("stick");
let joystick = document.getElementById("joystick");

joystick.addEventListener("touchmove", e => {
  let rect = joystick.getBoundingClientRect();
  let touch = e.touches[0];

  let x = touch.clientX - rect.left - 50;
  let y = touch.clientY - rect.top - 50;

  let dist = Math.sqrt(x*x + y*y);
  if (dist > 40) {
    x *= 40/dist;
    y *= 40/dist;
  }

  stick.style.left = (x+50-20) + "px";
  stick.style.top = (y+50-20) + "px";

  moveX = x / 40;
  moveY = y / 40;
});

joystick.addEventListener("touchend", () => {
  stick.style.left = "30px";
  stick.style.top = "30px";
  moveX = 0;
  moveY = 0;
});

// 🖱️ ROTAR CÁMARA
let yaw = 0;
let pitch = 0;

document.addEventListener("mousemove", e => {
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;

  pitch = Math.max(-1.5, Math.min(1.5, pitch));
});

// actualizar
function update() {
  let speed = 0.1;

  let dirX = Math.sin(yaw);
  let dirZ = Math.cos(yaw);

  player.position.x += (dirX * moveY + dirZ * moveX) * speed;
  player.position.z += (dirZ * moveY - dirX * moveX) * speed;

  // cámara sigue y gira
  camera.position.x = player.position.x - Math.sin(yaw)*5;
  camera.position.z = player.position.z - Math.cos(yaw)*5;
  camera.position.y = 2 + pitch*2;

  camera.lookAt(player.position);
}

// loop
function animate() {
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}
</script>

</body>
</html>
