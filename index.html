<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Vocaloid 3D Pro FIX</title>

<style>
body { margin:0; overflow:hidden; }

/* HUD */
#hud{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  z-index:5;
}

/* JOYSTICK */
#joystick{
  position:absolute;
  bottom:40px;
  left:40px;
  width:120px;height:120px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
}

#stick{
  width:50px;height:50px;
  background:white;
  border-radius:50%;
  position:relative;
  top:35px;left:35px;
}
</style>
</head>

<body>

<div id="hud">
Tiempo: <span id="time">360</span> |
Score: <span id="score">0</span> |
Onions: <span id="onions">0</span>
</div>

<div id="joystick"><div id="stick"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
let scene,camera,renderer;
let player,teto;

let yaw=0;

let joyX=0,joyY=0;

let items=[];
let npcs=[];

let score=0;
let onions=0;
let time=360;

/* INIT */
init();
animate();

function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* LUZ */
scene.add(new THREE.AmbientLight(0xffffff,0.6));
let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

/* PISO */
let floor=new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x55aa55})
);
floor.rotation.x=-Math.PI/2;
scene.add(floor);

/* PLAYER */
player=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xff69b4})
);
player.position.y=1;
scene.add(player);

/* TETO */
teto=new THREE.Group();

let head=new THREE.Mesh(
new THREE.BoxGeometry(0.8,0.8,0.8),
new THREE.MeshStandardMaterial({color:0xffc0cb})
);
head.position.y=1.5;

let body=new THREE.Mesh(
new THREE.BoxGeometry(0.6,0.8,0.4),
new THREE.MeshStandardMaterial({color:0xff69b4})
);
body.position.y=0.8;

/* PELO ROJO */
let hair=new THREE.Mesh(
new THREE.BoxGeometry(1,1.1,1),
new THREE.MeshStandardMaterial({color:0xff2a2a})
);
hair.position.y=1.75;

teto.add(head);
teto.add(body);
teto.add(hair);

scene.add(teto);

/* ITEMS */
for(let i=0;i<50;i++){
let color=Math.random()>0.5?0xffcc66:0x99ff99;

let item=new THREE.Mesh(
new THREE.CylinderGeometry(0.3,0.3,1,8),
new THREE.MeshStandardMaterial({color})
);

item.position.set(Math.random()*120-60,0.5,Math.random()*120-60);
item.userData.type=(color===0xffcc66)?"baguette":"cebollin";

scene.add(item);
items.push(item);
}

/* NPCs */
for(let i=0;i<6;i++){
let npc=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0x4444ff})
);

npc.position.set(Math.random()*100-50,1,Math.random()*100-50);

npc.userData={
  speed:0.05,
  dirX:Math.random()-0.5,
  dirZ:Math.random()-0.5
};

scene.add(npc);
npcs.push(npc);
}
}

/* JOYSTICK */
let joy=document.getElementById("joystick");
let stick=document.getElementById("stick");

joy.addEventListener("touchmove",(e)=>{
let t=e.touches[0];
let r=joy.getBoundingClientRect();

let x=t.clientX-(r.left+r.width/2);
let y=t.clientY-(r.top+r.height/2);

x=Math.max(-40,Math.min(40,x));
y=Math.max(-40,Math.min(40,y));

joyX=x/40;
joyY=y/40;

/* ROTAR CAMARA */
yaw -= joyX * 0.05;

stick.style.left=(35+x)+"px";
stick.style.top=(35+y)+"px";
});

joy.addEventListener("touchend",()=>{
joyX=0;joyY=0;
stick.style.left="35px";
stick.style.top="35px";
});

/* UPDATE */
function update(){

time-=1/60;

/* MOVIMIENTO */
let speed=0.2;

let forwardX=Math.sin(yaw);
let forwardZ=Math.cos(yaw);
let rightX=Math.cos(yaw);
let rightZ=-Math.sin(yaw);

let moveX=rightX*joyX + forwardX*(-joyY);
let moveZ=rightZ*joyX + forwardZ*(-joyY);

player.position.x+=moveX*speed;
player.position.z+=moveZ*speed;

/* CAMARA */
camera.position.x=player.position.x-Math.sin(yaw)*6;
camera.position.z=player.position.z-Math.cos(yaw)*6;
camera.position.y=player.position.y+3;

camera.lookAt(player.position);

/* ITEMS */
items=items.filter(i=>{
if(player.position.distanceTo(i.position)<2.5){

if(i.userData.type==="baguette") score++;
else onions++;

scene.remove(i);
return false;
}
return true;
});

/* NPCs */
npcs.forEach(npc=>{
let dx=player.position.x-npc.position.x;
let dz=player.position.z-npc.position.z;
let dist=Math.sqrt(dx*dx+dz*dz);

if(dist<10){
npc.position.x+=dx/dist*0.08;
npc.position.z+=dz/dist*0.08;
}else{
npc.position.x+=npc.userData.dirX*0.03;
npc.position.z+=npc.userData.dirZ*0.03;
}
});

/* HUD */
document.getElementById("time").innerText=Math.floor(time);
document.getElementById("score").innerText=score;
document.getElementById("onions").innerText=onions;

/* TETO FOLLOW */
teto.position.copy(player.position);
}

/* LOOP */
function animate(){
requestAnimationFrame(animate);
update();
renderer.render(scene,camera);
}
</script>

</body>
</html>
