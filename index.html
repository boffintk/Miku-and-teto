<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Roblox Style Vocaloid Game</title>

<style>
body { margin:0; overflow:hidden; }

#hud{
  position:absolute;
  top:10px; left:10px;
  color:white;
  z-index:5;
}

#staminaBar{
  width:150px;height:10px;
  background:gray;
}
#staminaFill{height:100%;width:100%;background:cyan;}

#joystick{
  position:absolute;
  bottom:40px;
  left:40px;
  width:120px;height:120px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
  z-index:10;
}

#stick{
  width:50px;height:50px;
  background:rgba(255,255,255,0.6);
  border-radius:50%;
  position:relative;
  top:35px;left:35px;
}
</style>
</head>

<body>

<div id="hud">
Tiempo: <span id="time">360</span><br>
Score: <span id="score">0</span><br>
Item: <span id="itemType">Baguette</span><br>

<div id="staminaBar"><div id="staminaFill"></div></div>
</div>

<div id="joystick"><div id="stick"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>

let scene,camera,renderer;
let player;
let yaw=0;

let joyX=0,joyY=0;
let items=[];

let score=0;
let time=360;
let stamina=100;
let sprint=false;

let itemType="baguette";

let keys={};

/* INIT */
init();
animate();

function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* luz */
scene.add(new THREE.AmbientLight(0xffffff,0.6));
let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

/* CIUDAD GRANDE */
let floor=new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x55aa55})
);
floor.rotation.x=-Math.PI/2;
scene.add(floor);

/* PLAYER */
player=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xff69b4})
);
player.position.y=1;
scene.add(player);

/* WALLS CIUDAD */
for(let i=0;i<40;i++){
let w=new THREE.Mesh(
new THREE.BoxGeometry(3,3,3),
new THREE.MeshStandardMaterial({color:0x888888})
);
w.position.set(Math.random()*100-50,1.5,Math.random()*100-50);
scene.add(w);
}

/* ITEMS (50 total) */
for(let i=0;i<50;i++){

let color = Math.random()>0.5?0xffcc66:0x99ff99;

let item=new THREE.Mesh(
new THREE.CylinderGeometry(0.3,0.3,1,8),
new THREE.MeshStandardMaterial({color})
);

item.position.set(Math.random()*120-60,0.5,Math.random()*120-60);
item.userData.type = (color===0xffcc66) ? "baguette":"cebollin";

scene.add(item);
items.push(item);
}
}

/* JOYSTICK */
let joy=document.getElementById("joystick");
let stick=document.getElementById("stick");

joy.addEventListener("touchmove",e=>{
let t=e.touches[0];
let r=joy.getBoundingClientRect();

joyX=(t.clientX-r.left-60)/60;
joyY=(t.clientY-r.top-60)/60;

stick.style.left=(35+joyX*30)+"px";
stick.style.top=(35+joyY*30)+"+" ;
});

joy.addEventListener("touchend",()=>{
joyX=0;joyY=0;
stick.style.left="35px";
stick.style.top="35px";
});

/* CAMERA ROTATION */
document.addEventListener("mousemove",e=>{
yaw-=e.movementX*0.003;
});

/* COLLISION SIMPLE */
function collide(x,z){
return false; // simplificado para ciudad grande
}

/* UPDATE */
function update(){

/* TIMER */
time-=1/60;

/* SPEED */
let speed=0.15;

/* MOVIMIENTO TIPO ROBLOX */
let dx=Math.sin(yaw)*(joyY) + Math.cos(yaw)*(joyX);
let dz=Math.cos(yaw)*(joyY) - Math.sin(yaw)*(joyX);

let nx=player.position.x+dx*speed;
let nz=player.position.z+dz*speed;

player.position.x=nx;
player.position.z=nz;

/* CAMARA TIPO ROBLOX */
camera.position.x=player.position.x-Math.sin(yaw)*6;
camera.position.y=player.position.y+3;
camera.position.z=player.position.z-Math.cos(yaw)*6;

camera.lookAt(player.position);

/* ITEMS COLLECT */
items=items.filter(i=>{

if(player.position.distanceTo(i.position)<2){

if(i.userData.type==="baguette"){
score+=1;
}else{
score+=2;
}

document.getElementById("itemType").innerText=i.userData.type;

scene.remove(i);
return false;
}
return true;
});

/* HUD */
document.getElementById("time").innerText=Math.floor(time);
document.getElementById("score").innerText=score;

document.getElementById("staminaFill").style.width=stamina+"%";

}

/* LOOP */
function animate(){
requestAnimationFrame(animate);
update();
renderer.render(scene,camera);
}

</script>

</body>
</html>
