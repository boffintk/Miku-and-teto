<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Vocaloid 3D Pro</title>

<style>
body { margin: 0; overflow: hidden; }

/* MENU INICIO */
#menu {
  position: absolute; width: 100%; height: 100%;
  background: black; color: white;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
}

/* JOYSTICK */
#joystick {
  position: absolute;
  bottom: 40px;
  left: 40px;
  width: 100px;
  height: 100px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
}
#stick {
  width: 40px;
  height: 40px;
  background: white;
  border-radius: 50%;
  position: absolute;
  left: 30px;
  top: 30px;
}

/* BOTON PAUSE */
#pauseBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  padding: 10px;
  font-size: 18px;
}

/* MENU PAUSA */
#pauseMenu {
  position: absolute;
  top: 40%;
  left: 40%;
  background: rgba(0,0,0,0.8);
  padding: 20px;
  display: none;
  color: white;
}

/* TIMER + SCORE */
#timer {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 20px;
}

button { margin: 5px; padding: 10px; }
</style>

</head>
<body>

<!-- MENU -->
<div id="menu">
  <h1>Vocaloid Game</h1>
  <button onclick="startGame()">Play</button>
</div>

<!-- PAUSE -->
<button id="pauseBtn" onclick="togglePause()">⏸️</button>

<div id="pauseMenu">
  <button onclick="resume()">Play</button>
  <button onclick="restart()">Restart</button>
  <button onclick="alert('Shop próximamente')">Shop</button>
</div>

<!-- HUD -->
<div id="timer">Tiempo: 180 | Baguettes: 0</div>

<!-- JOYSTICK -->
<div id="joystick"><div id="stick"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
let scene, camera, renderer, player;
let moveX = 0, moveY = 0;
let paused = false;
let time = 180;
let walls = [];
let baguettes = [];
let score = 0;

// iniciar
function startGame() {
  document.getElementById("menu").style.display = "none";
  init();
  animate();
}

// pausa
function togglePause(){
  paused = !paused;
  document.getElementById("pauseMenu").style.display = paused ? "block" : "none";
}
function resume(){
  paused = false;
  document.getElementById("pauseMenu").style.display = "none";
}
function restart(){
  location.reload();
}

// escena
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0,2,5);

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  let light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(5,10,5);
  scene.add(light);

  let ambient = new THREE.AmbientLight(0xffffff,0.6);
  scene.add(ambient);

  let floor = new THREE.Mesh(
    new THREE.PlaneGeometry(50,50),
    new THREE.MeshStandardMaterial({color: 0x55aa55})
  );
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color: 0xff69b4})
  );
  player.position.y = 0.5;
  scene.add(player);

  function createWall(x,y,z,w,h,d){
    let wall = new THREE.Mesh(
      new THREE.BoxGeometry(w,h,d),
      new THREE.MeshStandardMaterial({color: 0x888888})
    );
    wall.position.set(x,y,z);
    scene.add(wall);
    walls.push(wall);
  }

  createWall(0,1,-10,20,2,1);
  createWall(0,1,10,20,2,1);
  createWall(-10,1,0,1,2,20);
  createWall(10,1,0,1,2,20);

  for (let i = 0; i < 20; i++) {
    let baguette = new THREE.Mesh(
      new THREE.CylinderGeometry(0.2,0.2,1,8),
      new THREE.MeshStandardMaterial({color: 0xffcc66})
    );
    baguette.rotation.z = Math.PI/2;
    baguette.position.set(Math.random()*16-8,0.5,Math.random()*16-8);
    scene.add(baguette);
    baguettes.push(baguette);
  }
}

// joystick
let stick = document.getElementById("stick");
let joystick = document.getElementById("joystick");

joystick.addEventListener("touchmove", e => {
  let rect = joystick.getBoundingClientRect();
  let touch = e.touches[0];

  let x = touch.clientX - rect.left - 50;
  let y = touch.clientY - rect.top - 50;

  let dist = Math.sqrt(x*x + y*y);
  if (dist > 40) {
    x *= 40/dist;
    y *= 40/dist;
  }

  stick.style.left = (x+50-20) + "px";
  stick.style.top = (y+50-20) + "px";

  moveX = x / 40;
  moveY = y / 40;
});

joystick.addEventListener("touchend", () => {
  stick.style.left = "30px";
  stick.style.top = "30px";
  moveX = 0;
  moveY = 0;
});

// cámara
let yaw = 0;
let pitch = 0;

document.addEventListener("mousemove", e => {
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-1.5, Math.min(1.5, pitch));
});

// colisión
function checkCollision(newX, newZ){
  for(let w of walls){
    let dx = Math.abs(newX - w.position.x);
    let dz = Math.abs(newZ - w.position.z);

    if(dx < 2 && dz < 2){
      return true;
    }
  }
  return false;
}

// update
function update() {
  if (paused) return;

  let speed = 0.1;
  let dirX = Math.sin(yaw);
  let dirZ = Math.cos(yaw);

  let newX = player.position.x + (dirX * moveY + dirZ * moveX) * speed;
  let newZ = player.position.z + (dirZ * moveY - dirX * moveX) * speed;

  if(!checkCollision(newX,newZ)){
    player.position.x = newX;
    player.position.z = newZ;
  }

  baguettes = baguettes.filter(b => {
    let dist = player.position.distanceTo(b.position);

    if (dist < 1) {
      scene.remove(b);
      score++;
      return false;
    }
    return true;
  });

  document.getElementById("timer").innerText =
    "Tiempo: " + time + " | Baguettes: " + score;

  camera.position.x = player.position.x - Math.sin(yaw)*5;
  camera.position.z = player.position.z - Math.cos(yaw)*5;
  camera.position.y = 2 + pitch*2;

  camera.lookAt(player.position);
}

// tiempo
setInterval(()=>{
  if(!paused){
    time--;
    document.getElementById("timer").innerText =
      "Tiempo: " + time + " | Baguettes: " + score;
  }
},1000);

// loop
function animate() {
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}
</script>

</body>
</html>
