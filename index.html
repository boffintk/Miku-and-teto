<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Vocaloid 3D PRO FINAL REAL</title>

<style>
body { margin:0; overflow:hidden; }

/* HUD */
#hud{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  z-index:5;
}

/* JOYSTICK (IZQUIERDA) */
#joystick{
  position:absolute;
  bottom:40px;
  left:40px;
  width:120px;height:120px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
  z-index:10;
}

#stick{
  width:50px;height:50px;
  background:white;
  border-radius:50%;
  position:relative;
  top:35px;left:35px;
}

/* ZONA CAMARA (DERECHA) */
#cameraZone{
  position:absolute;
  right:0;
  top:0;
  width:50%;
  height:100%;
  z-index:2;
}
</style>
</head>

<body>

<div id="hud">
Tiempo: <span id="time">360</span> |
Score: <span id="score">0</span> |
Onions: <span id="onions">0</span>
</div>

<div id="joystick"><div id="stick"></div></div>
<div id="cameraZone"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
let scene,camera,renderer;
let player,teto,miku;

let yaw=0,pitch=0;
let joyX=0,joyY=0;

let items=[],npcs=[];
let score=0,onions=0,time=360;

/* INIT */
init();
animate();

function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* LUZ */
scene.add(new THREE.AmbientLight(0xffffff,0.7));
let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

/* PISO */
let floor=new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x55aa55})
);
floor.rotation.x=-Math.PI/2;
scene.add(floor);

/* PLAYER */
player=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xff69b4})
);
player.position.y=1;
scene.add(player);

/* 🎀 TETO MEJORADA */
teto=new THREE.Group();

let tHead=new THREE.Mesh(
new THREE.BoxGeometry(0.8,0.8,0.8),
new THREE.MeshStandardMaterial({color:0xffc0cb})
);
tHead.position.y=1.5;

/* pelo grande rojo */
let tHair=new THREE.Mesh(
new THREE.SphereGeometry(0.8,16,16),
new THREE.MeshStandardMaterial({color:0xff2a2a})
);
tHair.position.y=1.9;

/* coletas */
let tTail1=new THREE.Mesh(
new THREE.CylinderGeometry(0.12,0.12,2.2),
new THREE.MeshStandardMaterial({color:0xff2a2a})
);
tTail1.position.set(-0.5,1.4,-0.3);
tTail1.rotation.z=0.7;

let tTail2=tTail1.clone();
tTail2.position.x=0.5;

let tBody=new THREE.Mesh(
new THREE.BoxGeometry(0.7,1,0.4),
new THREE.MeshStandardMaterial({color:0xff69b4})
);
tBody.position.y=0.8;

teto.add(tHead,tHair,tTail1,tTail2,tBody);
scene.add(teto);

/* 🎤 MIKU */
miku=new THREE.Group();

let mHead=new THREE.Mesh(
new THREE.BoxGeometry(0.8,0.8,0.8),
new THREE.MeshStandardMaterial({color:0xffe0bd})
);
mHead.position.y=1.5;

let mHair=new THREE.Mesh(
new THREE.SphereGeometry(0.8,16,16),
new THREE.MeshStandardMaterial({color:0x00ccff})
);
mHair.position.y=1.9;

let mBody=new THREE.Mesh(
new THREE.BoxGeometry(0.7,1,0.4),
new THREE.MeshStandardMaterial({color:0x00ffcc})
);
mBody.position.y=0.8;

miku.add(mHead,mHair,mBody);
miku.position.x=4;
scene.add(miku);

/* ITEMS */
for(let i=0;i<50;i++){
let color=Math.random()>0.5?0xffcc66:0x99ff99;

let item=new THREE.Mesh(
new THREE.CylinderGeometry(0.3,0.3,1,8),
new THREE.MeshStandardMaterial({color})
);

item.position.set(Math.random()*120-60,0.5,Math.random()*120-60);
item.userData.type=(color===0xffcc66)?"baguette":"cebollin";

scene.add(item);
items.push(item);
}

/* NPCs */
for(let i=0;i<6;i++){
let npc=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0x4444ff})
);

npc.position.set(Math.random()*100-50,1,Math.random()*100-50);
npc.userData={dirX:Math.random()-0.5,dirZ:Math.random()-0.5};

scene.add(npc);
npcs.push(npc);
}
}

/* 🎮 JOYSTICK (SOLO MOVIMIENTO) */
let joy=document.getElementById("joystick");
let stick=document.getElementById("stick");

joy.addEventListener("touchmove",(e)=>{
let t=e.touches[0];
let r=joy.getBoundingClientRect();

let x=t.clientX-(r.left+r.width/2);
let y=t.clientY-(r.top+r.height/2);

x=Math.max(-40,Math.min(40,x));
y=Math.max(-40,Math.min(40,y));

joyX=x/40;
joyY=y/40;

stick.style.left=(35+x)+"px";
stick.style.top=(35+y)+"px";
});

joy.addEventListener("touchend",()=>{
joyX=0;joyY=0;
stick.style.left="35px";
stick.style.top="35px";
});

/* 📷 CAMARA (DERECHA) */
let camZone=document.getElementById("cameraZone");
let dragging=false,lastX=0,lastY=0;

camZone.addEventListener("touchstart",(e)=>{
dragging=true;
lastX=e.touches[0].clientX;
lastY=e.touches[0].clientY;
});

camZone.addEventListener("touchmove",(e)=>{
if(!dragging)return;

let dx=e.touches[0].clientX-lastX;
let dy=e.touches[0].clientY-lastY;

yaw-=dx*0.005;
pitch-=dy*0.005;

pitch=Math.max(-1.2,Math.min(1.2,pitch));

lastX=e.touches[0].clientX;
lastY=e.touches[0].clientY;
});

camZone.addEventListener("touchend",()=>dragging=false);

/* UPDATE */
function update(){

time-=1/60;

/* MOVIMIENTO */
let speed=0.2;

let fx=Math.sin(yaw);
let fz=Math.cos(yaw);
let rx=Math.cos(yaw);
let rz=-Math.sin(yaw);

player.position.x += (rx*joyX + fx*(-joyY))*speed;
player.position.z += (rz*joyX + fz*(-joyY))*speed;

/* CAMARA */
camera.position.x=player.position.x-Math.sin(yaw)*6;
camera.position.z=player.position.z-Math.cos(yaw)*6;
camera.position.y=player.position.y+3+pitch*2;

camera.lookAt(player.position);

/* ITEMS */
items=items.filter(i=>{
if(player.position.distanceTo(i.position)<2.5){
if(i.userData.type==="baguette") score++;
else onions++;
scene.remove(i);
return false;
}
return true;
});

/* NPC */
npcs.forEach(n=>{
let dx=player.position.x-n.position.x;
let dz=player.position.z-n.position.z;
let d=Math.sqrt(dx*dx+dz*dz);

if(d<10){
n.position.x+=dx/d*0.08;
n.position.z+=dz/d*0.08;
}else{
n.position.x+=n.userData.dirX*0.03;
n.position.z+=n.userData.dirZ*0.03;
}
});

/* HUD */
time=Math.max(0,time);
document.getElementById("time").innerText=Math.floor(time);
document.getElementById("score").innerText=score;
document.getElementById("onions").innerText=onions;

/* FOLLOW */
teto.position.copy(player.position);
}

/* LOOP */
function animate(){
requestAnimationFrame(animate);
update();
renderer.render(scene,camera);
}
</script>

</body>
</html>
