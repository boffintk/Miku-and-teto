<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Vocaloid 3D Game</title>
<style>
body { margin: 0; overflow: hidden; font-family: Arial; }
#menu {
  position: absolute; width: 100%; height: 100%;
  background: black; color: white;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
}
button { margin: 10px; padding: 10px 20px; font-size: 20px; }
#shop { display: none; }
</style>
</head>
<body>

<div id="menu">
  <h1>Vocaloid Game</h1>
  <button onclick="startGame()">Play</button>
  <button onclick="openShop()">Shop</button>

  <div id="shop">
    <h2>Tienda</h2>
    <button onclick="buy('miku')">Comprar Miku</button>
    <button onclick="buy('teto')">Comprar Teto</button>
    <button onclick="closeShop()">Volver</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
let scene, camera, renderer, player;
let keys = {};
let coins = 100;
let owned = {};

// controles
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// iniciar juego
function startGame() {
  document.getElementById("menu").style.display = "none";
  init();
  animate();
}

// tienda
function openShop() {
  document.getElementById("shop").style.display = "block";
}
function closeShop() {
  document.getElementById("shop").style.display = "none";
}
function buy(name) {
  if (coins >= 50) {
    owned[name] = true;
    coins -= 50;
    alert("Compraste " + name);
  } else {
    alert("No tienes monedas");
  }
}

// escena 3D
function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.y = 2;
  camera.position.z = 5;

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // piso
  let floor = new THREE.Mesh(
    new THREE.PlaneGeometry(50,50),
    new THREE.MeshBasicMaterial({color: 0x444444})
  );
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);

  // jugador (cubo)
  let geo = new THREE.BoxGeometry(1,1,1);
  let mat = new THREE.MeshBasicMaterial({color: 0xff69b4});
  player = new THREE.Mesh(geo, mat);
  player.position.y = 0.5;
  scene.add(player);

  // paredes
  for (let i = 0; i < 5; i++) {
    let wall = new THREE.Mesh(
      new THREE.BoxGeometry(2,2,2),
      new THREE.MeshBasicMaterial({color: 0x888888})
    );
    wall.position.set(Math.random()*20-10,1,Math.random()*20-10);
    scene.add(wall);
  }
}

// movimiento + cámara
function update() {
  let speed = 0.1;

  if (keys["w"]) player.position.z -= speed;
  if (keys["s"]) player.position.z += speed;
  if (keys["a"]) player.position.x -= speed;
  if (keys["d"]) player.position.x += speed;

  // cámara sigue al jugador
  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 5;
  camera.lookAt(player.position);
}

// loop
function animate() {
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}
</script>

</body>
</html>
